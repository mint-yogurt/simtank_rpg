<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>simtank_rpg</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #ddd; font-family: monospace;
         display: flex; flex-direction: column; align-items: center;
         padding: 16px; gap: 12px; }
  h1 { font-size: 28px; color: #888; letter-spacing: 2px; }
  #main { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  #viewport { position: relative; }
  #map { display: block; image-rendering: pixelated; }
  #sprite-layer { position: absolute; top: 0; left: 0;
                  image-rendering: pixelated; pointer-events: none; }
  #sidebar { display: flex; flex-direction: column; gap: 8px; width: 768px; max-width: 100%; }
  #log { width: 100%; height: 160px; overflow-y: auto;
         background: #1a1a1a; border: 1px solid #333; padding: 8px;
         font-size: 24px; line-height: 1.6; }
  #log .propose { color: #8af; }
  #log .vote    { color: #af8; }
  #log .resolve { color: #fa8; }
  #log .screen  { color: #f8f; }
  #status { font-size: 22px; color: #666; }

  /* Battle overlay */
  #battle-overlay {
    display: none;
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.82);
    flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; z-index: 10;
  }
  #battle-overlay.active { display: flex; }
  #battle-inner {
    display: flex; align-items: flex-start; gap: 32px;
    background: #1a1a1a; border: 1px solid #555;
    padding: 16px 24px; border-radius: 4px;
  }
  .battle-side { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .battle-name { font-size: 22px; color: #aaa; letter-spacing: 1px; }
  .battle-sprite { width: 64px; height: 64px; image-rendering: pixelated; }
  .hp-bar-wrap { width: 64px; height: 8px; background: #333; border-radius: 2px; overflow: hidden; }
  .hp-bar { height: 100%; background: #4c4; transition: width 0.3s; }
  .hp-bar.low { background: #c84; }
  .hp-bar.crit { background: #c44; }
  .hp-text { font-size: 20px; color: #888; }
  #battle-vs-label { font-size: 36px; color: #666; align-self: center; }
  #battle-party-side { display: flex; gap: 12px; }
  #battle-result {
    font-size: 28px; letter-spacing: 2px; color: #ff8;
    min-height: 20px; text-align: center;
  }

  /* Side-by-side layout on short screens */
  @media (max-height: 800px) {
    #main { flex-direction: row; align-items: flex-start; }
    #sidebar { width: 320px; flex-shrink: 0; }
    #log { height: 672px; }
  }
</style>
</head>
<body>
<h1>SIMTANK RPG</h1>

<div id="main">
<div id="viewport">
  <canvas id="map"></canvas>
  <canvas id="sprite-layer"></canvas>
  <div id="battle-overlay">
    <div id="battle-inner">
      <div id="battle-party-side"></div>
      <div id="battle-vs-label">VS</div>
      <div id="battle-enemy-side" class="battle-side"></div>
    </div>
    <div id="battle-result"></div>
  </div>
</div>

<div id="sidebar">
  <div id="log"></div>
  <div id="status">connecting…</div>
</div>
</div>

<script src="static/app.js"></script>
</body>
</html>
