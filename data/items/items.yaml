    description: Still dripping wet. Heals 20 HP.
    effect: {hp: 20}
    stackable: true
    value: 4

  - id: goo
    name: Goo
    category: consumables
    description: Unidentified but restorative.
    effect: {hp: 10, mp: 5}
    stackable: true
    value: 6

  - id: bag_of_soup
    name: Bag of Soup
    category: consumables
    description: What, you've never ate soup out of a grocery bag? Restores 50 HP.
