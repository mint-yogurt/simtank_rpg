# items.yaml — item definitions for Front House Gaiden
#
# Fields:
#   id:          unique snake_case key referenced by inventory/loot tables
#   icon:        icon name ## worry about this later
#   name:        display name
#   category:    consumables | weapon | armour | key
#   description: flavour text for the item screen
#   effect:      {hp: N} and/or {mp: N} and/or other keys as new effect types show up; omit for non-consumables
#   slot:        for weapon/armour — which equipment slot this fills
#   stackable:   true for consumables, false for equipment/key items
#   value:       shop sell price in whatever currency unit we settle on (0 = unsellable)

consumables:
  - id: forgotten_onion
    name: Forgotten Onion
    category: consumables
    description: A source of much crying. Restores 15 HP.
    effect: {hp: 15}
    stackable: true
    value: 5

  - id: large_meatball
    name: Large Meatball
    category: consumables
    description: Mystery meat. Restores 10 HP
    effect: {hp: 10}
    stackable: true
    value: 3

  - id: chinese_mana_potion
    name: Chinese Mana Potion
    category: consumables
    description: It's covered in unreadable warning labels.
    effect: {mp: 20}
    stackable: true
    value: 8

  - id: piggled_egg
    name: Piggled Egg
    category: consumables
    description: Curiously spicy pickled egg. Restores 25 HP.
    effect: {hp: 25}
    stackable: true
    value: 8

  - id: boiled_hotdog
    name: Boiled Hotdog
