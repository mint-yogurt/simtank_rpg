# Master NPC list -- hand-edited. Loaded by engine.npc.load_npc_defs() /
# load_npc_sprite_specs(). A map's npcs_<map>.yaml (see
# data/maps/populate_yamls.py) references an entry here by `npc_id`; that
# placement's own sprite/behavior/dialogue fields are optional overrides —
# leave them blank (null / []) to inherit from the matching entry below,
# fill one in to override it for just that one placement. (Recoloring below
# is keyed to npc_id specifically, not overridable per-placement -- see the
# npcs: section.)
#
# NOTE: data/npcs/dialogue and data/npcs/ideas are unrelated personal
# planning notes, not consumed by anything here or in the engine — nothing
# from them is ported into this file.

# ── Sprites ───────────────────────────────────────────────────────────────
#
# Names each NPC sprite strip living in assets/sprites/npcs/ -- one PNG file
# per sprite (same convention as data/enemy/enemies.yaml's `sprite` field
# and assets/sprites/enemies/), NOT the old shared party_sprites.png +
# partysprites.txt mechanism, which is deprecated for NPCs -- nothing here
# reads that file anymore. `file` is a bare filename stem (no `.png`), e.g.
# `npc01` for assets/sprites/npcs/npc01.png.
#
# A sprite strip's width decides how it animates -- engine.renderer infers
# frame count from it (2 or 8; whichever evenly divides the strip into
# tile_px(16px)-multiple frames, trying 8 first) and picks behavior by that
# count:
#
#   32x16  (2 frames, 16px each)  -- south-only idle, the old npc01-style
#                                    look. Facing is ignored; it always
#                                    alternates its 2 frames.
#   128x16 (8 frames, 16px each)  -- full 4-directional walk cycle, same
#                                    frame order as the party sheet: S1,S2,
#                                    N1,N2,W1,W2,E1,E2. A "static" NPC using
#                                    one of these faces whatever its
#                                    `facing:` field says (below); a "wander"
#                                    NPC turns to face whichever direction
#                                    it's currently stepping.
#
# Height can be any multiple of 16px, independent of the frame-count table
# above (which is keyed off width only) -- e.g. wizard is 128x32: still the
# 8-frame walk cycle, just 32px tall per frame. The bottom-left 16px row of
# each frame is the ordinary body (behaves exactly like a 16x16 sprite); any
# rows above that are just placed on top as a fixed overhang (a hat, tall
# hair, ...) with no animation of their own.
#
# A frame can likewise be wider than one tile -- e.g. manager is 64x32: 2
# frames, each 32x32, a 2-tile-wide/2-tile-tall south-only idle loop (same
# animation rule as the 32x16 case, just a bigger frame). Extra columns to
# the right of the bottom-left 16x16 cell are the rest of a wider character,
# same "no animation of its own" rule as the overhang rows above. A map
# object placing a wide NPC anchors at that bottom-*left* 16x16 cell -- put
# the object where you want the sprite's lower-left corner, and it extends
# up and to the right from there; the player can walk up to and interact
# with any tile the sprite visually covers, not just the anchor tile (see
# engine.renderer.NPC.width_span/height_span).
#
# `colors` lists the placeholder hex colors actually baked into that PNG's
# pixels (6-digit, no `#`, e.g. "ff83c1") -- the swap *keys* a `npcs:`
# entry's own `colors` (below) recolors, position-matched: this sprite's
# colors[0] swaps to that NPC's colors[0], colors[1] to colors[1], and so
# on. An NPC that doesn't set `colors` just shows the sprite as authored, no
# swap. Recoloring happens once per unique NPC def when the game loads (not
# per frame drawn), so multiple differently-colored NPCs can share one
# sprite strip for free.
#
# ALWAYS QUOTE hex values, everywhere in this file -- "000000", not 000000.
# YAML reads an unquoted all-digit value as a number, not text, and it does
# NOT just reinterpret the digits: "000000" unquoted parses as the integer
# 0 (silently wrong), and "001100" unquoted parses as *octal* 001100 = 576
# decimal (silently very wrong) -- both load without any error, they're
# just not the color you typed. Any hex value with only 0-9 digits (no
# a-f) needs quotes; engine.npc's loaders also hard-fail on an unquoted one
# that slipped through, rather than risk drawing the wrong color silently.
#
# Template -- copy this block, rename the key, point it at a filename stem
# in assets/sprites/npcs/, and list that PNG's own placeholder colors:
#
# some_sprite_id:
#   file: some_sprite_id
#   colors: ["000000", "ffffff", "ade231"]

sprites:
  npc01:
    file: npc01
    colors: ["ff83c1", "3f51cf", "c03570"]   # 32x16 -- 2 frames, south-only idle
  poots:
    file: poots
    colors: ["000000", "ffffff", "ade231"]   # 128x16 -- 8 frames, full facing
  wizard:
    file: wizard
    colors: ["930084", "bcbcbc", "bcbcbc", "503001"]
  billy1:
    file: billy
    colors: []
  roach2:
    file: roach2
    colors: []
  pizza_cashier:
    file: pizza_cashier
    colors: ["ff0000"] ## just re-coloring the hat
  flies:
    file: flies
    colors: []
  gnome1:
    file: gnome1
    colors: ["930084", "7c7c7c", "01a800", "fddfa9"]
  manager:
    file: manager
    colors: ["004059", "f1d0b1", "a77865", "503001"] # shirt, skin, skin shade, shoes
  melvin_sleep:
    file: melvin_sleep
    colors: []

# ── NPCs ──────────────────────────────────────────────────────────────────
#
# One entry per reusable NPC definition, referenced by `npc_id` from any
# map's npcs_<map>.yaml. `sprite` must be a key in the sprites: section
# above; `behavior` is "static" (idles in place) or "wander" (roams walkable
# tiles); `facing` (static only -- ignored/overwritten for "wander", which
# always faces its current movement direction) is "N"/"S"/"E"/"W", defaults
# to "S" if left blank -- only visible on an 8-frame sprite, a 2-frame one
# has no directional art to show it with.
#
# `colors`, if set, replaces this sprite's own placeholder colors for this
# NPC specifically, same length/order as the sprite's own `colors` list
# (see Sprites above) -- this is what lets two different NPCs share one
# sprite strip but look different. Leave it unset to use the sprite as
# authored.
#
# `dialogue` here is this def's own fallback -- shown by any placement that
# references this npc_id and doesn't set its own `dialogue:` override in
# its npcs_<map>.yaml entry (see that file's stub comments). For a
# reusable/generic NPC (barks shared across several placements) it belongs
# here; for a one-off named character with exactly one placement (like
# wizard), it's usually simpler to just leave this blank and author the
# real dialogue directly on that one placement instead -- same two shapes
# either place:
#
# Simplest -- a flat page list, same shape as a sign's, always shown the
# same way regardless of game state:
#
#   dialogue:
#     - "Some line of dialogue."
#     - "Another page."
#
# Or a list of *variants* to support dialogue that changes based on
# engine.game_state flags -- each one an optional `when:` (flags that must
# ALL be true), an optional `unless:` (flags that must ALL be false), and
# its own `pages:`. Checked top-to-bottom, first variant whose when/unless
# both pass wins -- put the most specific/rare conditions first, and an
# unconditional variant (no when/unless at all) last as the catch-all.
# Every npc_id gets a free flag, "npc_met:<npc_id>", set the instant it's
# ever talked to (before that visit, it isn't set yet) -- reference it in
# an `unless` to write a character's first-ever-meeting dialogue. Nothing
# else sets flags for you; a variant keyed on some other event (a quest
# beat, an item found, ...) only works once whatever triggers that event
# actually calls game_state.set_flag for it.
#
#   dialogue:
#     - unless: ["npc_met:some_npc_id"]   # first time ever, before that flag exists
#       pages:
#         - "First-meeting line."
#     - when: ["some_other_flag"]         # later, once some_other_flag is set
#       pages:
#         - "Conditional line."
#     - pages:                            # fallback -- always matches
#         - "Default line."
#
# Template -- copy this block, rename the key, fill in your own values:
#
# some_npc_id:                  # key other placements reference as npc_id
#   sprite: npc01                # a key in the sprites: section above
#   behavior: static              # static | wander
#   facing: S                     # N | S | E | W -- static only, defaults to S
#   colors: ["000000", "ffffff", "ade231"]   # optional -- recolors npc01 for just this NPC
#   dialogue:                     # flat page list, shown on interact
#     - "Some line of dialogue."

npcs:
  wizard:
    sprite: wizard
    behavior: static
    facing: S

  melvin_sleep:
    sprite: melvin_sleep
    behavior: static
    facing: S 