  - And the Side House is gone! After years of garden warfare, the Side House Boys
    Headquarters disappeared without a trace.
  - I don't know what's going on, but you will have to figure this all out. The House
    Wars must continue, it cannot end like this. We must return the Side House and
    finish this fight properly!
  event: null
  name: wizard
  npc_id: null
  sprite: wizard
  type: npc
