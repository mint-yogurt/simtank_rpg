<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Front House Gaiden</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #c8c8c8;
      font-family: "Courier New", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      min-height: 100vh;
    }
    h1 {
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 12px;
    }
    #game-wrap {
      position: relative;
      display: inline-block;
      border: 2px solid #333;
      image-rendering: pixelated;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }
    #sprite-layer {
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
    }
    #status {
      margin-top: 8px;
      font-size: 11px;
      color: #666;
      letter-spacing: 1px;
      min-height: 16px;
    }
    #log {
      margin-top: 10px;
      width: 768px;
      max-width: 100%;
      height: 120px;
      overflow-y: auto;
      font-size: 11px;
      color: #555;
      border-top: 1px solid #222;
      padding-top: 6px;
    }
    #log .info  { color: #777; }
    #log .event { color: #4a8; }
    #log .warn  { color: #a84; }
    #controls {
      margin-top: 10px;
      font-size: 10px;
      color: #444;
      letter-spacing: 1px;
    }
    #ws-status {
      position: absolute;
      top: 4px; right: 6px;
      font-size: 9px;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Front House Gaiden</h1>
  <div id="game-wrap">
    <canvas id="map"></canvas>
    <canvas id="sprite-layer"></canvas>
    <span id="ws-status">connecting…</span>
  </div>
  <div id="status">loading…</div>
  <div id="log"></div>
  <div id="controls">arrows: move &nbsp;|&nbsp; Z: confirm &nbsp;|&nbsp; X: cancel &nbsp;|&nbsp; enter: start</div>
  <script src="static/game.js"></script>
</body>
</html>
